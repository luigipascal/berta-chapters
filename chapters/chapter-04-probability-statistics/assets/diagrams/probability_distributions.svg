<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 360" width="520" height="360">
  <defs>
    <linearGradient id="normGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90d9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2c5282;stop-opacity:0.7" />
    </linearGradient>
    <linearGradient id="binomGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#48bb78;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#276749;stop-opacity:0.7" />
    </linearGradient>
    <linearGradient id="poissGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ed8936;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c05621;stop-opacity:0.7" />
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#374151" />
    </marker>
  </defs>
  <rect width="520" height="360" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" rx="4"/>
  <text x="260" y="28" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" font-weight="bold" fill="#1e293b">Probability Distributions &amp; Relationships</text>
  
  <!-- Bernoulli -->
  <rect x="20" y="55" width="100" height="55" rx="6" fill="#e0e7ff" stroke="#6366f1" stroke-width="2"/>
  <text x="70" y="78" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="bold" fill="#4338ca">Bernoulli</text>
  <text x="70" y="95" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#4f46e5">p  [0,1]</text>
  <text x="70" y="108" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#6366f1">1 trial, binary</text>

  <!-- Binomial: n Bernoullis -->
  <rect x="200" y="55" width="100" height="55" rx="6" fill="#d1fae5" stroke="#10b981" stroke-width="2"/>
  <text x="250" y="78" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="bold" fill="#047857">Binomial</text>
  <text x="250" y="95" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#059669">n, p</text>
  <text x="250" y="108" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#34d399">n trials, sum</text>

  <!-- Poisson -->
  <rect x="380" y="55" width="100" height="55" rx="6" fill="#ffedd5" stroke="#f59e0b" stroke-width="2"/>
  <text x="430" y="78" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="bold" fill="#b45309">Poisson</text>
  <text x="430" y="95" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#d97706">ģ</text>
  <text x="430" y="108" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#fbbf24">counts / time</text>

  <!-- Uniform -->
  <rect x="20" y="145" width="100" height="50" rx="6" fill="#fce7f3" stroke="#ec4899" stroke-width="2"/>
  <text x="70" y="168" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="bold" fill="#be185d">Uniform</text>
  <text x="70" y="185" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#db2777">a, b</text>

  <!-- Exponential -->
  <rect x="200" y="145" width="100" height="50" rx="6" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="2"/>
  <text x="250" y="168" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="bold" fill="#0369a1">Exponential</text>
  <text x="250" y="185" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#0284c7">ģ, wait times</text>

  <!-- Normal (central) -->
  <rect x="180" y="215" width="140" height="75" rx="6" fill="url(#normGrad)" stroke="#1e40af" stroke-width="2"/>
  <text x="250" y="245" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="bold" fill="#ffffff">Normal</text>
  <text x="250" y="263" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#93c5fd">ŧ, Ã˛</text>
  <text x="250" y="280" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#bfdbfe">CLT: n limit</text>

  <!-- Arrows: Bernoulli -> Binomial -->
  <line x1="120" y1="82" x2="195" y2="82" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="157" y="75" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#475569">n trials</text>

  <!-- Arrows: Binomial -> Normal (np large) -->
  <line x1="250" y1="110" x2="250" y2="210" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="260" y="165" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#475569">n, CLT</text>

  <!-- Arrows: Binomial -> Poisson -->
  <line x1="300" y1="82" x2="375" y2="82" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="337" y="75" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#475569">ģ=np, n</text>

  <!-- Uniform -> Normal (via CLT for sums) -->
  <line x1="70" y1="195" x2="180" y2="252" stroke="#64748b" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arrowhead)"/>
  <text x="115" y="235" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#64748b">sums</text>

  <!-- Exponential relationship -->
  <line x1="250" y1="195" x2="250" y2="215" stroke="#64748b" stroke-width="1" marker-end="url(#arrowhead)"/>
  <text x="262" y="208" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#64748b">sum</text>

  <!-- Legend -->
  <rect x="20" y="310" width="480" height="38" rx="4" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="260" y="328" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#475569">AI/ML: Normal (activations), Binomial (accuracy), Poisson (event counts), Bernoulli (binary labels)</text>
</svg>
