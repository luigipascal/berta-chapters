<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" width="480" height="320">
  <defs>
    <linearGradient id="priorG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#93c5fd;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="likeG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#86efac;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="postG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fcd34d;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0.9" />
    </linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#64748b" />
    </marker>
  </defs>
  <rect width="480" height="320" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" rx="4"/>
  <text x="240" y="28" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" font-weight="bold" fill="#1e293b">Bayes' Theorem: Medical Test Example</text>
  <text x="240" y="46" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">P(Disease|Positive) = P(Positive|Disease) æ P(Disease) / P(Positive)</text>

  <!-- Prior: P(Disease) -->
  <rect x="30" y="70" width="130" height="85" rx="6" fill="url(#priorG)" stroke="#2563eb" stroke-width="2"/>
  <text x="95" y="95" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="bold" fill="#1e3a5f">Prior</text>
  <text x="95" y="113" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#1e3a8a">P(Disease) = 0.01</text>
  <text x="95" y="130" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#1e40af">Base rate: 1% prevalence</text>
  <text x="95" y="148" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#3b82f6">Belief before test</text>

  <!-- Likelihood: P(Positive|Disease) -->
  <rect x="175" y="70" width="130" height="85" rx="6" fill="url(#likeG)" stroke="#16a34a" stroke-width="2"/>
  <text x="240" y="95" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="bold" fill="#14532d">Likelihood</text>
  <text x="240" y="113" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#166534">P(Pos|Disease)=0.95</text>
  <text x="240" y="130" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#15803d">Sensitivity: 95%</text>
  <text x="240" y="148" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#22c55e">True positive rate</text>

  <!-- Posterior: P(Disease|Positive) -->
  <rect x="320" y="70" width="130" height="85" rx="6" fill="url(#postG)" stroke="#d97706" stroke-width="2"/>
  <text x="385" y="95" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="bold" fill="#78350f">Posterior</text>
  <text x="385" y="113" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#92400e">P(Disease|Pos) H 16%</text>
  <text x="385" y="130" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#b45309">Updated belief</text>
  <text x="385" y="148" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#f59e0b">After positive result</text>

  <!-- Arrows: Prior -> Likelihood -> Posterior -->
  <line x1="160" y1="107" x2="172" y2="107" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="305" y1="107" x2="317" y2="107" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Formula flow -->
  <rect x="50" y="185" width="380" height="55" rx="6" fill="#f1f5f9" stroke="#94a3b8"/>
  <text x="240" y="210" text-anchor="middle" font-family="monospace" font-size="14" fill="#334155">Posterior = Likelihood æ Prior / Evidence</text>
  <text x="240" y="232" text-anchor="middle" font-family="monospace" font-size="12" fill="#64748b">P(D|E) = P(E|D) æ P(D) / P(E)    Update beliefs with evidence</text>

  <!-- Probability areas visual -->
  <text x="240" y="265" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="bold" fill="#475569">Probability Areas</text>
  <rect x="80" y="275" width="45" height="25" rx="3" fill="#93c5fd"/>
  <text x="102" y="292" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9">Prior</text>
  <rect x="200" y="275" width="45" height="25" rx="3" fill="#86efac"/>
  <text x="222" y="292" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9">Likelihood</text>
  <rect x="320" y="275" width="45" height="25" rx="3" fill="#fcd34d"/>
  <text x="342" y="292" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9">Posterior</text>
</svg>
