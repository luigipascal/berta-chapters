<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 450" width="580" height="450">
  <defs>
    <linearGradient id="rootG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#4f46e5;stop-opacity:0.95" />
    </linearGradient>
    <linearGradient id="internalG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#94a3b8;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#64748b;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="approveG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:0.95" />
    </linearGradient>
    <linearGradient id="rejectG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#dc2626;stop-opacity:0.95" />
    </linearGradient>
  </defs>
  <rect width="580" height="450" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" rx="4"/>
  <text x="290" y="28" text-anchor="middle" font-family="system-ui,sans-serif" font-size="20" font-weight="bold" fill="#1e293b">Decision Tree: Loan Approval</text>
  <text x="290" y="46" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">Split on features ’ reach leaf with class label</text>

  <!-- Root node -->
  <rect x="230" y="65" width="120" height="50" rx="8" fill="url(#rootG)" stroke="#4338ca" stroke-width="2"/>
  <text x="290" y="90" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="bold" fill="#fff">Income &gt; 50k?</text>
  <text x="290" y="106" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#c7d2fe">Root split</text>

  <!-- Branch: Yes (left) -->
  <line x1="260" y1="115" x2="150" y2="165" stroke="#64748b" stroke-width="2"/>
  <text x="190" y="142" font-family="system-ui,sans-serif" font-size="10" fill="#22c55e" font-weight="bold">Yes</text>

  <!-- Internal node: Yes branch -->
  <rect x="80" y="165" width="140" height="45" rx="6" fill="url(#internalG)" stroke="#475569" stroke-width="1"/>
  <text x="150" y="185" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="bold" fill="#fff">Debt ratio &lt; 0.3?</text>
  <text x="150" y="201" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#e2e8f0">Second level</text>

  <!-- Branch from debt ratio: Yes -->
  <line x1="100" y1="188" x2="80" y2="260" stroke="#64748b" stroke-width="1.5"/>
  <text x="85" y="228" font-family="system-ui,sans-serif" font-size="9" fill="#22c55e">Yes</text>
  <!-- Leaf: Approve -->
  <rect x="30" y="260" width="100" height="45" rx="6" fill="url(#approveG)" stroke="#16a34a" stroke-width="2"/>
  <text x="80" y="282" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="bold" fill="#fff">APPROVE</text>
  <text x="80" y="298" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#bbf7d0">Low risk</text>

  <!-- Branch from debt ratio: No -->
  <line x1="200" y1="188" x2="250" y2="260" stroke="#64748b" stroke-width="1.5"/>
  <text x="218" y="228" font-family="system-ui,sans-serif" font-size="9" fill="#ef4444">No</text>
  <!-- Leaf: Reject -->
  <rect x="200" y="260" width="100" height="45" rx="6" fill="url(#rejectG)" stroke="#dc2626" stroke-width="2"/>
  <text x="250" y="282" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="bold" fill="#fff">REJECT</text>
  <text x="250" y="298" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#fecaca">High debt</text>

  <!-- Branch: No (right) from root -->
  <line x1="320" y1="115" x2="430" y2="165" stroke="#64748b" stroke-width="2"/>
  <text x="360" y="142" font-family="system-ui,sans-serif" font-size="10" fill="#ef4444" font-weight="bold">No</text>

  <!-- Internal node: No branch -->
  <rect x="360" y="165" width="140" height="45" rx="6" fill="url(#internalG)" stroke="#475569" stroke-width="1"/>
  <text x="430" y="185" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="bold" fill="#fff">Credit score &gt; 650?</text>
  <text x="430" y="201" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#e2e8f0">Second level</text>

  <!-- Branch: Credit score Yes -->
  <line x1="400" y1="188" x2="380" y2="260" stroke="#64748b" stroke-width="1.5"/>
  <text x="385" y="228" font-family="system-ui,sans-serif" font-size="9" fill="#22c55e">Yes</text>
  <!-- Leaf: Approve (conditional) -->
  <rect x="330" y="260" width="100" height="45" rx="6" fill="url(#approveG)" stroke="#16a34a" stroke-width="2"/>
  <text x="380" y="282" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="bold" fill="#fff">APPROVE</text>
  <text x="380" y="298" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#bbf7d0">Good score</text>

  <!-- Branch: Credit score No -->
  <line x1="460" y1="188" x2="530" y2="260" stroke="#64748b" stroke-width="1.5"/>
  <text x="490" y="228" font-family="system-ui,sans-serif" font-size="9" fill="#ef4444">No</text>
  <!-- Leaf: Reject -->
  <rect x="480" y="260" width="100" height="45" rx="6" fill="url(#rejectG)" stroke="#dc2626" stroke-width="2"/>
  <text x="530" y="282" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="bold" fill="#fff">REJECT</text>
  <text x="530" y="298" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#fecaca">Low score</text>

  <!-- Legend -->
  <rect x="20" y="330" width="540" height="105" rx="6" fill="#f1f5f9" stroke="#94a3b8"/>
  <text x="290" y="355" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="bold" fill="#334155">Decision Tree Structure</text>
  <rect x="50" y="375" width="120" height="30" rx="4" fill="url(#rootG)"/>
  <text x="110" y="395" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#fff">Root/Internal: condition</text>
  <rect x="200" y="375" width="100" height="30" rx="4" fill="url(#approveG)"/>
  <text x="250" y="395" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#fff">Leaf: APPROVE</text>
  <rect x="330" y="375" width="100" height="30" rx="4" fill="url(#rejectG)"/>
  <text x="380" y="395" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#fff">Leaf: REJECT</text>
  <text x="470" y="395" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#64748b">Branches = Yes/No answers</text>
</svg>
