<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" width="720" height="420">
  <defs>
    <linearGradient id="bagG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="boostG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#15803d;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="stackG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:0.9" />
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="720" height="420" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" rx="4"/>
  <text x="360" y="28" text-anchor="middle" font-family="system-ui,sans-serif" font-size="20" font-weight="bold" fill="#1e293b">Ensemble Methods: How They Work</text>
  <text x="360" y="48" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">Bagging | Boosting | Stacking</text>

  <!-- Section 1: Bagging -->
  <rect x="20" y="65" width="220" height="340" rx="8" fill="#fff" stroke="#93c5fd" stroke-width="2"/>
  <rect x="30" y="75" width="200" height="35" rx="6" fill="url(#bagG)"/>
  <text x="130" y="98" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="bold" fill="#fff">Bagging (Parallel)</text>

  <!-- Data bootstrap -->
  <ellipse cx="130" cy="130" rx="55" ry="25" fill="#dbeafe" stroke="#3b82f6"/>
  <text x="130" y="135" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#1e40af">Bootstrap Samples</text>
  <line x1="130" y1="155" x2="130" y2="175" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Weak learners in parallel -->
  <rect x="50" y="180" width="55" height="35" rx="4" fill="#93c5fd" stroke="#3b82f6"/>
  <text x="77" y="200" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#1e3a8a">Tree 1</text>
  <rect x="115" y="180" width="55" height="35" rx="4" fill="#93c5fd" stroke="#3b82f6"/>
  <text x="142" y="200" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#1e3a8a">Tree 2</text>
  <rect x="180" y="180" width="55" height="35" rx="4" fill="#93c5fd" stroke="#3b82f6"/>
  <text x="207" y="200" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#1e3a8a">Tree n</text>
  <text x="130" y="230" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#64748b">Independent, parallel training</text>
  <line x1="130" y1="240" x2="130" y2="260" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Vote -->
  <rect x="80" y="265" width="100" height="40" rx="6" fill="#3b82f6" stroke="#1d4ed8"/>
  <text x="130" y="290" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="bold" fill="#fff">Vote / Average</text>
  <line x1="130" y1="305" x2="130" y2="325" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="90" y="330" width="80" height="30" rx="4" fill="#1e40af"/>
  <text x="130" y="350" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="bold" fill="#fff">Final Prediction</text>
  <text x="130" y="390" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#64748b">Random Forest uses this</text>

  <!-- Section 2: Boosting -->
  <rect x="260" y="65" width="200" height="340" rx="8" fill="#fff" stroke="#86efac" stroke-width="2"/>
  <rect x="270" y="75" width="180" height="35" rx="6" fill="url(#boostG)"/>
  <text x="360" y="98" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="bold" fill="#fff">Boosting (Sequential)</text>

  <!-- Sequential flow -->
  <rect x="300" y="125" width="80" height="30" rx="4" fill="#86efac" stroke="#22c55e"/>
  <text x="340" y="145" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#166534">Learner 1</text>
  <line x1="340" y1="155" x2="340" y2="175" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="365" y="168" font-family="system-ui,sans-serif" font-size="8" fill="#ef4444">errors</text>
  <rect x="300" y="180" width="80" height="30" rx="4" fill="#86efac" stroke="#22c55e"/>
  <text x="340" y="200" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#166534">Learner 2</text>
  <text x="355" y="195" font-family="system-ui,sans-serif" font-size="8" fill="#64748b">fixes</text>
  <line x1="340" y1="210" x2="340" y2="230" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="300" y="235" width="80" height="30" rx="4" fill="#86efac" stroke="#22c55e"/>
  <text x="340" y="255" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#166534">Learner 3</text>
  <line x1="340" y1="265" x2="340" y2="285" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="130" y="278" font-family="system-ui,sans-serif" font-size="8" fill="#64748b"/>
  <rect x="290" y="290" width="100" height="35" rx="4" fill="#22c55e" stroke="#16a34a"/>
  <text x="340" y="312" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="bold" fill="#fff">Weighted sum</text>
  <line x1="340" y1="325" x2="340" y2="345" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="300" y="350" width="80" height="30" rx="4" fill="#16a34a"/>
  <text x="340" y="370" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="bold" fill="#fff">Prediction</text>
  <text x="360" y="390" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#64748b">GBM, XGBoost, AdaBoost</text>

  <!-- Section 3: Stacking -->
  <rect x="480" y="65" width="220" height="340" rx="8" fill="#fff" stroke="#fcd34d" stroke-width="2"/>
  <rect x="490" y="75" width="200" height="35" rx="6" fill="url(#stackG)"/>
  <text x="590" y="98" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="bold" fill="#fff">Stacking (Meta-learner)</text>

  <!-- Base learners -->
  <rect x="505" y="125" width="70" height="28" rx="4" fill="#fcd34d" stroke="#f59e0b"/>
  <text x="540" y="143" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#78350f">LR</text>
  <rect x="585" y="125" width="70" height="28" rx="4" fill="#fcd34d" stroke="#f59e0b"/>
  <text x="620" y="143" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#78350f">SVM</text>
  <rect x="665" y="125" width="70" height="28" rx="4" fill="#fcd34d" stroke="#f59e0b"/>
  <text x="700" y="143" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#78350f">Tree</text>
  <text x="590" y="168" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#64748b">Base models (Level 0)</text>
  <line x1="540" y1="170" x2="540" y2="195" stroke="#64748b" stroke-width="1"/>
  <line x1="620" y1="170" x2="620" y2="195" stroke="#64748b" stroke-width="1"/>
  <line x1="700" y1="170" x2="700" y2="195" stroke="#64748b" stroke-width="1"/>
  <path d="M 520 195 L 660 195" stroke="#64748b" stroke-width="1"/>
  <line x1="590" y1="195" x2="590" y2="220" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="590" y="215" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#64748b">Predictions as features</text>

  <!-- Meta-learner -->
  <rect x="515" y="225" width="150" height="50" rx="8" fill="#f59e0b" stroke="#d97706"/>
  <text x="590" y="250" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="bold" fill="#fff">Meta-learner (Level 1)</text>
  <text x="590" y="267" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#fef3c7">LR / NN on base outputs</text>
  <line x1="590" y1="275" x2="590" y2="300" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="530" y="305" width="120" height="40" rx="6" fill="#d97706"/>
  <text x="590" y="330" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="bold" fill="#fff">Final Prediction</text>
  <text x="590" y="390" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#64748b">Learns to combine base models</text>

  <!-- Bottom legend -->
  <rect x="20" y="415" width="680" height="0" fill="none"/>
</svg>
