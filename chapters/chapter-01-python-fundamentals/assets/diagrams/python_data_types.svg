<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 520" width="680" height="520">
  <defs>
    <linearGradient id="objG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="numG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#93c5fd;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:0.95" />
    </linearGradient>
    <linearGradient id="seqG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a5b4fc;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#818cf8;stop-opacity:0.95" />
    </linearGradient>
    <linearGradient id="mapG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#86efac;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#4ade80;stop-opacity:0.95" />
    </linearGradient>
    <linearGradient id="setG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fcd34d;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:0.95" />
    </linearGradient>
    <linearGradient id="boolG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#94a3b8;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#64748b;stop-opacity:0.95" />
    </linearGradient>
    <marker id="arrowM" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#475569" />
    </marker>
  </defs>
  <rect width="680" height="520" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" rx="6"/>
  <text x="340" y="32" text-anchor="middle" font-family="system-ui,sans-serif" font-size="20" font-weight="bold" fill="#1e293b">Python Data Types Taxonomy</text>
  <text x="340" y="52" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">Solid border = immutable | Dashed border = mutable</text>

  <!-- Root: Object -->
  <rect x="270" y="65" width="140" height="45" rx="8" fill="url(#objG)" stroke="#2563eb" stroke-width="2"/>
  <text x="340" y="92" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="bold" fill="white">Object</text>

  <!-- Connecting lines from Object to children -->
  <line x1="340" y1="110" x2="120" y2="160" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="2,2"/>
  <line x1="340" y1="110" x2="200" y2="160" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="2,2"/>
  <line x1="340" y1="110" x2="280" y2="160" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="2,2"/>
  <line x1="340" y1="110" x2="340" y2="160" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="2,2"/>
  <line x1="340" y1="110" x2="480" y2="160" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="2,2"/>
  <line x1="340" y1="110" x2="560" y2="160" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="2,2"/>
  <line x1="340" y1="110" x2="620" y2="160" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="2,2"/>

  <!-- Numeric (immutable) -->
  <rect x="40" y="175" width="160" height="100" rx="6" fill="url(#numG)" stroke="#2563eb" stroke-width="2"/>
  <text x="120" y="200" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="bold" fill="#1e3a5f">Numeric</text>
  <rect x="55" y="215" width="55" height="24" rx="4" fill="#dbeafe" stroke="#3b82f6"/>
  <text x="82" y="232" text-anchor="middle" font-family="monospace" font-size="11" fill="#1e40af">int</text>
  <rect x="120" y="215" width="55" height="24" rx="4" fill="#dbeafe" stroke="#3b82f6"/>
  <text x="147" y="232" text-anchor="middle" font-family="monospace" font-size="11" fill="#1e40af">float</text>
  <rect x="130" y="250" width="70" height="24" rx="4" fill="#dbeafe" stroke="#3b82f6"/>
  <text x="165" y="267" text-anchor="middle" font-family="monospace" font-size="11" fill="#1e40af">complex</text>

  <!-- Sequences -->
  <rect x="210" y="175" width="180" height="100" rx="6" fill="url(#seqG)" stroke="#6366f1" stroke-width="2"/>
  <text x="300" y="200" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="bold" fill="#312e81">Sequences</text>
  <rect x="225" y="215" width="55" height="24" rx="4" fill="#e0e7ff" stroke="#6366f1" stroke-dasharray="none"/>
  <text x="252" y="232" text-anchor="middle" font-family="monospace" font-size="10" fill="#4338ca">str</text>
  <rect x="290" y="215" width="55" height="24" rx="4" fill="#e0e7ff" stroke="#6366f1" stroke-dasharray="4,2"/>
  <text x="317" y="232" text-anchor="middle" font-family="monospace" font-size="10" fill="#4338ca">list</text>
  <rect x="355" y="215" width="55" height="24" rx="4" fill="#e0e7ff" stroke="#6366f1" stroke-dasharray="none"/>
  <text x="382" y="232" text-anchor="middle" font-family="monospace" font-size="10" fill="#4338ca">tuple</text>
  <text x="300" y="270" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#4f46e5">immut / mut / immut</text>

  <!-- Mappings -->
  <rect x="405" y="175" width="110" height="100" rx="6" fill="url(#mapG)" stroke="#22c55e" stroke-width="2"/>
  <text x="460" y="200" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="bold" fill="#14532d">Mappings</text>
  <rect x="420" y="225" width="80" height="35" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-dasharray="4,2"/>
  <text x="460" y="248" text-anchor="middle" font-family="monospace" font-size="14" fill="#166534">dict</text>

  <!-- Sets -->
  <rect x="530" y="175" width="130" height="100" rx="6" fill="url(#setG)" stroke="#f59e0b" stroke-width="2"/>
  <text x="595" y="200" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="bold" fill="#78350f">Sets</text>
  <rect x="545" y="215" width="55" height="24" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-dasharray="4,2"/>
  <text x="572" y="232" text-anchor="middle" font-family="monospace" font-size="10" fill="#b45309">set</text>
  <rect x="610" y="215" width="70" height="24" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-dasharray="none"/>
  <text x="645" y="232" text-anchor="middle" font-family="monospace" font-size="9" fill="#b45309">frozenset</text>
  <text x="595" y="270" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#d97706">mut / immut</text>

  <!-- Boolean (bottom row) -->
  <rect x="120" y="300" width="120" height="55" rx="6" fill="url(#boolG)" stroke="#64748b" stroke-width="2"/>
  <text x="180" y="325" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="bold" fill="#1e293b">Boolean</text>
  <rect x="135" y="335" width="90" height="22" rx="4" fill="#f1f5f9" stroke="#64748b"/>
  <text x="180" y="350" text-anchor="middle" font-family="monospace" font-size="11" fill="#334155">bool</text>

  <!-- None (bottom row) -->
  <rect x="440" y="300" width="120" height="55" rx="6" fill="url(#boolG)" stroke="#64748b" stroke-width="2"/>
  <text x="500" y="325" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="bold" fill="#1e293b">None</text>
  <rect x="455" y="335" width="90" height="22" rx="4" fill="#f1f5f9" stroke="#64748b"/>
  <text x="500" y="350" text-anchor="middle" font-family="monospace" font-size="11" fill="#334155">NoneType</text>

  <!-- Legend -->
  <rect x="40" y="380" width="600" height="120" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="340" y="408" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="bold" fill="#334155">Legend</text>
  <rect x="60" y="425" width="30" height="20" rx="3" fill="#dbeafe" stroke="#3b82f6"/>
  <text x="110" y="440" text-anchor="start" font-family="system-ui,sans-serif" font-size="11" fill="#475569">Solid = immutable</text>
  <rect x="260" y="425" width="30" height="20" rx="3" fill="#e0e7ff" stroke="#6366f1" stroke-dasharray="4,2"/>
  <text x="310" y="440" text-anchor="start" font-family="system-ui,sans-serif" font-size="11" fill="#475569">Dashed = mutable</text>
  <text x="60" y="470" text-anchor="start" font-family="system-ui,sans-serif" font-size="10" fill="#64748b">Numeric: int, float, complex | Sequences: str, list, tuple | Mappings: dict | Sets: set, frozenset</text>
  <text x="60" y="488" text-anchor="start" font-family="system-ui,sans-serif" font-size="10" fill="#64748b">Boolean: bool | None: NoneType (singleton)</text>
</svg>
