<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" width="900" height="620">
  <defs>
    <linearGradient id="listG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#93c5fd;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#60a5fa;stop-opacity:0.95" />
    </linearGradient>
    <linearGradient id="dictG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#86efac;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#4ade80;stop-opacity:0.95" />
    </linearGradient>
    <linearGradient id="setG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fcd34d;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:0.95" />
    </linearGradient>
    <linearGradient id="stackG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0.95" />
    </linearGradient>
    <linearGradient id="queueG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f472b6;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:0.95" />
    </linearGradient>
    <linearGradient id="treeG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#67e8f9;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#22d3ee;stop-opacity:0.95" />
    </linearGradient>
    <linearGradient id="graphG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f87171;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:0.95" />
    </linearGradient>
  </defs>
  <rect width="900" height="620" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" rx="6"/>
  <text x="450" y="32" text-anchor="middle" font-family="system-ui,sans-serif" font-size="20" font-weight="bold" fill="#1e293b">Data Structures Comparison</text>
  <text x="450" y="52" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">Visual representation, key operations, and time complexity</text>

  <!-- Row 1: List -->
  <rect x="30" y="75" width="200" height="165" rx="8" fill="url(#listG)" stroke="#2563eb" stroke-width="2"/>
  <text x="130" y="102" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="bold" fill="#1e3a5f">List</text>
  <rect x="45" y="115" width="170" height="35" rx="4" fill="white" opacity="0.9"/>
  <rect x="55" y="122" width="22" height="22" rx="2" fill="#3b82f6"/>
  <rect x="82" y="122" width="22" height="22" rx="2" fill="#60a5fa"/>
  <rect x="109" y="122" width="22" height="22" rx="2" fill="#93c5fd"/>
  <rect x="136" y="122" width="22" height="22" rx="2" fill="#60a5fa"/>
  <rect x="163" y="122" width="22" height="22" rx="2" fill="#3b82f6"/>
  <text x="130" y="158" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#1e40af">[0] [1] [2] [3] [4]  ordered, indexed</text>
  <text x="130" y="178" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="bold" fill="#1e3a5f">Ops:</text>
  <text x="130" y="193" text-anchor="middle" font-family="monospace" font-size="9" fill="#334155">append O(1), insert O(n), access O(1)</text>
  <text x="130" y="208" text-anchor="middle" font-family="monospace" font-size="9" fill="#334155">search O(n), sort O(n log n)</text>

  <!-- Dict -->
  <rect x="250" y="75" width="200" height="165" rx="8" fill="url(#dictG)" stroke="#16a34a" stroke-width="2"/>
  <text x="350" y="102" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="bold" fill="#14532d">Dict</text>
  <rect x="265" y="115" width="170" height="50" rx="4" fill="white" opacity="0.9"/>
  <text x="275" y="132" font-family="monospace" font-size="9" fill="#166534">"a" ’ 1</text>
  <text x="275" y="147" font-family="monospace" font-size="9" fill="#166534">"b" ’ 2</text>
  <text x="355" y="132" font-family="monospace" font-size="9" fill="#166534">"c" ’ 3</text>
  <text x="355" y="147" font-family="monospace" font-size="9" fill="#166534">key ’ value</text>
  <text x="350" y="178" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="bold" fill="#14532d">Ops:</text>
  <text x="350" y="193" text-anchor="middle" font-family="monospace" font-size="9" fill="#334155">get/set O(1), delete O(1)</text>
  <text x="350" y="208" text-anchor="middle" font-family="monospace" font-size="9" fill="#334155">keys, values O(n)</text>

  <!-- Set -->
  <rect x="470" y="75" width="200" height="165" rx="8" fill="url(#setG)" stroke="#d97706" stroke-width="2"/>
  <text x="570" y="102" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="bold" fill="#78350f">Set</text>
  <rect x="485" y="115" width="170" height="45" rx="4" fill="white" opacity="0.9"/>
  <circle cx="520" cy="138" r="12" fill="#f59e0b"/>
  <circle cx="560" cy="138" r="12" fill="#fbbf24"/>
  <circle cx="600" cy="138" r="12" fill="#f59e0b"/>
  <text x="570" y="175" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#92400e">unordered, unique</text>
  <text x="570" y="193" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="bold" fill="#78350f">Ops:</text>
  <text x="570" y="208" text-anchor="middle" font-family="monospace" font-size="9" fill="#334155">add O(1), in O(1), union O(n)</text>

  <!-- Stack -->
  <rect x="690" y="75" width="200" height="165" rx="8" fill="url(#stackG)" stroke="#7c3aed" stroke-width="2"/>
  <text x="790" y="102" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="bold" fill="#4c1d95">Stack</text>
  <rect x="705" y="115" width="170" height="55" rx="4" fill="white" opacity="0.9"/>
  <rect x="720" y="125" width="140" height="12" rx="1" fill="#8b5cf6"/>
  <rect x="730" y="140" width="120" height="12" rx="1" fill="#a78bfa"/>
  <rect x="740" y="155" width="100" height="12" rx="1" fill="#c4b5fd"/>
  <text x="790" y="185" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#6d28d9">LIFO  push/pop</text>
  <text x="790" y="203" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="bold" fill="#4c1d95">Ops:</text>
  <text x="790" y="218" text-anchor="middle" font-family="monospace" font-size="9" fill="#334155">push O(1), pop O(1), peek O(1)</text>

  <!-- Row 2: Queue -->
  <rect x="30" y="260" width="200" height="165" rx="8" fill="url(#queueG)" stroke="#db2777" stroke-width="2"/>
  <text x="130" y="287" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="bold" fill="#831843">Queue</text>
  <rect x="45" y="300" width="170" height="45" rx="4" fill="white" opacity="0.9"/>
  <polygon points="60 315 80 305 80 325" fill="#ec4899"/>
  <rect x="90" y="308" width="30" height="14" rx="1" fill="#f472b6"/>
  <rect x="128" y="308" width="30" height="14" rx="1" fill="#f9a8d4"/>
  <polygon points="170 315 150 305 150 325" fill="#ec4899"/>
  <text x="130" y="358" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#9d174d">FIFO  enqueue/dequeue</text>
  <text x="130" y="376" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="bold" fill="#831843">Ops:</text>
  <text x="130" y="391" text-anchor="middle" font-family="monospace" font-size="9" fill="#334155">enqueue O(1), dequeue O(1)</text>

  <!-- Tree -->
  <rect x="250" y="260" width="200" height="165" rx="8" fill="url(#treeG)" stroke="#0891b2" stroke-width="2"/>
  <text x="350" y="287" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="bold" fill="#164e63">Tree</text>
  <rect x="265" y="300" width="170" height="55" rx="4" fill="white" opacity="0.9"/>
  <circle cx="350" cy="315" r="8" fill="#22d3ee"/>
  <line x1="350" y1="323" x2="310" y2="345" stroke="#0891b2" stroke-width="2"/>
  <line x1="350" y1="323" x2="390" y2="345" stroke="#0891b2" stroke-width="2"/>
  <circle cx="310" cy="350" r="6" fill="#67e8f9"/>
  <circle cx="390" cy="350" r="6" fill="#67e8f9"/>
  <text x="350" y="368" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#0e7490">hierarchical, parent-child</text>
  <text x="350" y="386" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="bold" fill="#164e63">Ops:</text>
  <text x="350" y="401" text-anchor="middle" font-family="monospace" font-size="9" fill="#334155">insert O(log n), search O(log n)</text>

  <!-- Graph -->
  <rect x="470" y="260" width="200" height="165" rx="8" fill="url(#graphG)" stroke="#dc2626" stroke-width="2"/>
  <text x="570" y="287" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="bold" fill="#7f1d1d">Graph</text>
  <rect x="485" y="300" width="170" height="55" rx="4" fill="white" opacity="0.9"/>
  <circle cx="510" cy="318" r="10" fill="#ef4444"/>
  <circle cx="560" cy="318" r="10" fill="#f87171"/>
  <circle cx="535" cy="345" r="10" fill="#f87171"/>
  <circle cx="630" cy="345" r="10" fill="#ef4444"/>
  <line x1="518" y1="324" x2="552" y2="324" stroke="#64748b" stroke-width="1.5"/>
  <line x1="527" y1="333" x2="540" y2="340" stroke="#64748b" stroke-width="1.5"/>
  <line x1="568" y1="324" x2="622" y2="340" stroke="#64748b" stroke-width="1.5"/>
  <text x="570" y="368" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#991b1b">nodes + edges</text>
  <text x="570" y="386" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="bold" fill="#7f1d1d">Ops:</text>
  <text x="570" y="401" text-anchor="middle" font-family="monospace" font-size="9" fill="#334155">BFS/DFS O(V+E), add edge O(1)</text>

  <!-- Summary grid footer -->
  <rect x="690" y="260" width="200" height="165" rx="8" fill="#f1f5f9" stroke="#94a3b8"/>
  <text x="790" y="287" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="bold" fill="#334155">Quick Reference</text>
  <text x="705" y="315" font-family="system-ui,sans-serif" font-size="10" fill="#475569">List: ordered, mutable</text>
  <text x="705" y="332" font-family="system-ui,sans-serif" font-size="10" fill="#475569">Dict: key-value, O(1) lookup</text>
  <text x="705" y="349" font-family="system-ui,sans-serif" font-size="10" fill="#475569">Set: unique, no duplicates</text>
  <text x="705" y="366" font-family="system-ui,sans-serif" font-size="10" fill="#475569">Stack: LIFO</text>
  <text x="705" y="383" font-family="system-ui,sans-serif" font-size="10" fill="#475569">Queue: FIFO</text>
  <text x="705" y="400" font-family="system-ui,sans-serif" font-size="10" fill="#475569">Tree: hierarchical</text>
  <text x="705" y="417" font-family="system-ui,sans-serif" font-size="10" fill="#475569">Graph: nodes + edges</text>

  <!-- Bottom reference -->
  <rect x="30" y="450" width="840" height="150" rx="6" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="450" y="478" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="bold" fill="#334155">Time Complexity Summary</text>
  <text x="80" y="505" font-family="system-ui,sans-serif" font-size="11" fill="#475569">List: append O(1), index O(1), search O(n) | Dict/Set: get/add O(1) avg | Stack/Queue: push/pop O(1)</text>
  <text x="80" y="525" font-family="system-ui,sans-serif" font-size="11" fill="#475569">Tree (BST): insert/search O(log n) avg, O(n) worst | Graph: BFS/DFS O(V+E), storage O(V+E)</text>
  <text x="80" y="545" font-family="system-ui,sans-serif" font-size="11" fill="#475569">Choose by: access pattern (index vs key), order (LIFO/FIFO/hierarchical), uniqueness (set vs list)</text>
</svg>
