<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520" width="880" height="520">
  <defs>
    <linearGradient id="bar1" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#93c5fd;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bar2" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#86efac;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bar3" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fcd34d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bar4" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c4b5fd;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bar5" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f9a8d4;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="880" height="520" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" rx="6"/>
  <text x="440" y="28" text-anchor="middle" font-family="system-ui,sans-serif" font-size="20" font-weight="bold" fill="#1e293b">Sorting Algorithms Comparison</text>
  <text x="440" y="48" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">Step-by-step visualization: Bubble Sort, Merge Sort, Quicksort</text>

  <!-- Bubble Sort section -->
  <rect x="20" y="65" width="270" height="200" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="155" y="92" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="bold" fill="#1e40af">Bubble Sort  O(n˛)</text>
  <text x="155" y="108" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#64748b">Compare adjacent, swap if wrong order</text>

  <!-- Bubble step 1 -->
  <text x="155" y="128" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#475569">Step 1: [5, 2, 8, 1, 9]</text>
  <rect x="50" y="138" width="28" height="35" rx="2" fill="url(#bar1)"/>
  <rect x="82" y="148" width="28" height="25" rx="2" fill="url(#bar2)"/>
  <rect x="114" y="135" width="28" height="38" rx="2" fill="url(#bar3)"/>
  <rect x="146" y="162" width="28" height="11" rx="2" fill="url(#bar4)"/>
  <rect x="178" y="130" width="28" height="43" rx="2" fill="url(#bar5)"/>
  <text x="64" y="185" text-anchor="middle" font-family="monospace" font-size="9">5</text>
  <text x="96" y="185" text-anchor="middle" font-family="monospace" font-size="9">2</text>
  <text x="128" y="185" text-anchor="middle" font-family="monospace" font-size="9">8</text>
  <text x="160" y="185" text-anchor="middle" font-family="monospace" font-size="9">1</text>
  <text x="192" y="185" text-anchor="middle" font-family="monospace" font-size="9">9</text>

  <!-- Bubble step 2 -->
  <text x="155" y="208" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#475569">Step 2: [2, 5, 1, 8, 9]  after 1st pass</text>
  <rect x="50" y="218" width="28" height="25" rx="2" fill="url(#bar2)"/>
  <rect x="82" y="225" width="28" height="18" rx="2" fill="url(#bar1)"/>
  <rect x="114" y="240" width="28" height="3" rx="2" fill="url(#bar4)"/>
  <rect x="146" y="228" width="28" height="15" rx="2" fill="url(#bar3)"/>
  <rect x="178" y="218" width="28" height="25" rx="2" fill="url(#bar5)"/>
  <text x="64" y="255" text-anchor="middle" font-family="monospace" font-size="9">2</text>
  <text x="96" y="255" text-anchor="middle" font-family="monospace" font-size="9">5</text>
  <text x="128" y="255" text-anchor="middle" font-family="monospace" font-size="9">1</text>
  <text x="160" y="255" text-anchor="middle" font-family="monospace" font-size="9">8</text>
  <text x="192" y="255" text-anchor="middle" font-family="monospace" font-size="9">9</text>

  <!-- Merge Sort section -->
  <rect x="305" y="65" width="270" height="200" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="440" y="92" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="bold" fill="#166534">Merge Sort  O(n log n)</text>
  <text x="440" y="108" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#64748b">Divide &amp; conquer, merge sorted halves</text>

  <!-- Merge divide structure -->
  <text x="440" y="130" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#475569">Divide:</text>
  <line x1="440" y1="138" x2="370" y2="165"/>
  <line x1="440" y1="138" x2="510" y2="165"/>
  <rect x="340" y="165" width="60" height="25" rx="4" fill="#dcfce7" stroke="#22c55e"/>
  <text x="370" y="182" text-anchor="middle" font-family="monospace" font-size="9">[5,2,8]</text>
  <rect x="440" y="165" width="60" height="25" rx="4" fill="#dcfce7" stroke="#22c55e"/>
  <text x="470" y="182" text-anchor="middle" font-family="monospace" font-size="9">[1,9]</text>
  <line x1="370" y1="190" x2="355" y2="210"/>
  <line x1="370" y1="190" x2="385" y2="210"/>
  <rect x="325" y="210" width="40" height="22" rx="3" fill="#bbf7d0"/>
  <text x="345" y="225" text-anchor="middle" font-family="monospace" font-size="8">[5,2]</text>
  <rect x="375" y="210" width="30" height="22" rx="3" fill="#bbf7d0"/>
  <text x="390" y="225" text-anchor="middle" font-family="monospace" font-size="8">[8]</text>
  <text x="440" y="228" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#166534">Merge: [2,5,8] + [1,9] ’ [1,2,5,8,9]</text>
  <rect x="360" y="238" width="160" height="22" rx="4" fill="#22c55e"/>
  <text x="440" y="254" text-anchor="middle" font-family="monospace" font-size="10" fill="white">[1, 2, 5, 8, 9] sorted</text>

  <!-- Quicksort section -->
  <rect x="590" y="65" width="270" height="200" rx="8" fill="#fffbeb" stroke="#f59e0b" stroke-width="2"/>
  <text x="725" y="92" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="bold" fill="#b45309">Quicksort  O(n log n) avg</text>
  <text x="725" y="108" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#64748b">Pick pivot, partition, recurse</text>

  <!-- Quicksort steps -->
  <text x="725" y="130" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#475569">Step 1: pivot=5, partition</text>
  <rect x="610" y="142" width="35" height="28" rx="2" fill="url(#bar4)"/>
  <rect x="650" y="155" width="35" height="15" rx="2" fill="url(#bar2)"/>
  <rect x="690" y="138" width="35" height="32" rx="2" fill="url(#bar3)"/>
  <rect x="730" y="165" width="35" height="5" rx="2" fill="url(#bar1)"/>
  <rect x="770" y="135" width="35" height="35" rx="2" fill="url(#bar5)"/>
  <text x="627" y="178" text-anchor="middle" font-family="monospace" font-size="9">1</text>
  <text x="667" y="178" text-anchor="middle" font-family="monospace" font-size="9">2</text>
  <text x="707" y="178" text-anchor="middle" font-family="monospace" font-size="9">8</text>
  <text x="747" y="178" text-anchor="middle" font-family="monospace" font-size="9" font-weight="bold">5</text>
  <text x="787" y="178" text-anchor="middle" font-family="monospace" font-size="9">9</text>
  <text x="747" y="195" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#b45309">pivot</text>

  <text x="725" y="215" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#475569">Step 2: left [1,2] right [8,9] ’ recurse</text>
  <rect x="615" y="228" width="50" height="22" rx="3" fill="#fef3c7"/>
  <text x="640" y="244" text-anchor="middle" font-family="monospace" font-size="9">[1,2]</text>
  <rect x="680" y="228" width="30" height="22" rx="3" fill="#fef3c7"/>
  <text x="695" y="244" text-anchor="middle" font-family="monospace" font-size="9">5</text>
  <rect x="725" y="228" width="50" height="22" rx="3" fill="#fef3c7"/>
  <text x="750" y="244" text-anchor="middle" font-family="monospace" font-size="9">[8,9]</text>
  <text x="725" y="265" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#92400e">Combine: [1,2] + 5 + [8,9] = [1,2,5,8,9]</text>

  <!-- Algorithm summary -->
  <rect x="20" y="285" width="840" height="120" rx="8" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="440" y="312" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="bold" fill="#334155">Algorithm Comparison</text>
  <rect x="40" y="325" width="250" height="70" rx="6" fill="#eff6ff" stroke="#93c5fd"/>
  <text x="165" y="348" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="bold" fill="#1e40af">Bubble Sort</text>
  <text x="165" y="368" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#475569">In-place, stable, O(n˛)  good for small n</text>
  <text x="165" y="385" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#475569">Many swaps, each pass bubbles max to end</text>

  <rect x="305" y="325" width="270" height="70" rx="6" fill="#f0fdf4" stroke="#86efac"/>
  <text x="440" y="348" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="bold" fill="#166534">Merge Sort</text>
  <text x="440" y="368" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#475569">Divide &amp; conquer, O(n log n), stable</text>
  <text x="440" y="385" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#475569">Uses O(n) extra space, consistent performance</text>

  <rect x="590" y="325" width="270" height="70" rx="6" fill="#fffbeb" stroke="#fcd34d"/>
  <text x="725" y="348" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="bold" fill="#b45309">Quicksort</text>
  <text x="725" y="368" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#475569">Partition by pivot, O(n log n) avg, O(n˛) worst</text>
  <text x="725" y="385" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#475569">In-place, cache-friendly, often fastest in practice</text>

  <!-- Complexity table -->
  <rect x="20" y="420" width="840" height="85" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="440" y="448" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="bold" fill="#334155">Time Complexity</text>
  <rect x="60" y="458" width="180" height="35" rx="4" fill="#f1f5f9"/>
  <text x="150" y="478" text-anchor="middle" font-family="monospace" font-size="10" fill="#475569">Bubble: O(n˛) best/avg/worst</text>
  <rect x="260" y="458" width="180" height="35" rx="4" fill="#f1f5f9"/>
  <text x="350" y="478" text-anchor="middle" font-family="monospace" font-size="10" fill="#475569">Merge: O(n log n) all cases</text>
  <rect x="460" y="458" width="180" height="35" rx="4" fill="#f1f5f9"/>
  <text x="550" y="478" text-anchor="middle" font-family="monospace" font-size="10" fill="#475569">Quick: O(n log n) avg, O(n˛) worst</text>
  <rect x="660" y="458" width="180" height="35" rx="4" fill="#f1f5f9"/>
  <text x="750" y="478" text-anchor="middle" font-family="monospace" font-size="10" fill="#475569">Space: O(1) / O(n) / O(log n)</text>
</svg>
