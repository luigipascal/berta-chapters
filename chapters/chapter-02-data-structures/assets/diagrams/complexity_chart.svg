<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 480" width="620" height="480">
  <defs>
    <linearGradient id="o1G" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:0" />
    </linearGradient>
    <linearGradient id="ologG" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0" />
    </linearGradient>
    <linearGradient id="onG" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0" />
    </linearGradient>
    <linearGradient id="onlogG" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0" />
    </linearGradient>
    <linearGradient id="on2G" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:0" />
    </linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#475569" />
    </marker>
  </defs>
  <rect width="620" height="480" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" rx="6"/>
  <text x="310" y="28" text-anchor="middle" font-family="system-ui,sans-serif" font-size="20" font-weight="bold" fill="#1e293b">Big O Complexity Chart</text>
  <text x="310" y="48" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">Operations vs input size n  lower is better</text>

  <!-- Axes -->
  <line x1="80" y1="400" x2="560" y2="400" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="80" y1="400" x2="80" y2="70" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
  <text x="320" y="435" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="bold" fill="#334155">Input Size (n)</text>
  <text x="35" y="235" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="bold" fill="#334155" transform="rotate(-90 35 235)">Operations</text>

  <!-- Axis ticks -->
  <line x1="80" y1="400" x2="80" y2="395" stroke="#64748b"/>
  <text x="80" y="418" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#64748b">0</text>
  <line x1="200" y1="400" x2="200" y2="395" stroke="#64748b"/>
  <text x="200" y="418" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#64748b">25</text>
  <line x1="320" y1="400" x2="320" y2="395" stroke="#64748b"/>
  <text x="320" y="418" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#64748b">50</text>
  <line x1="440" y1="400" x2="440" y2="395" stroke="#64748b"/>
  <text x="440" y="418" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#64748b">75</text>
  <line x1="560" y1="400" x2="560" y2="395" stroke="#64748b"/>
  <text x="560" y="418" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#64748b">100</text>

  <line x1="80" y1="400" x2="85" y2="400" stroke="#64748b"/>
  <text x="65" y="404" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#64748b">0</text>
  <line x1="80" y1="320" x2="85" y2="320" stroke="#64748b"/>
  <text x="65" y="324" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#64748b">k</text>
  <line x1="80" y1="70" x2="85" y2="70" stroke="#64748b"/>
  <text x="65" y="74" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#64748b">‘</text>

  <!-- O(1) - flat horizontal line -->
  <line x1="80" y1="365" x2="560" y2="365" stroke="#22c55e" stroke-width="3"/>
  <text x="575" y="368" text-anchor="start" font-family="monospace" font-size="12" font-weight="bold" fill="#166534">O(1)</text>

  <!-- O(log n) - logarithmic curve -->
  <path d="M 80 365 Q 150 340 200 320 Q 280 290 360 260 Q 440 230 560 200" fill="none" stroke="#3b82f6" stroke-width="3"/>
  <text x="575" y="205" text-anchor="start" font-family="monospace" font-size="12" font-weight="bold" fill="#1e40af">O(log n)</text>

  <!-- O(n) - linear diagonal -->
  <line x1="80" y1="400" x2="320" y2="235" stroke="#f59e0b" stroke-width="3"/>
  <line x1="320" y1="235" x2="560" y2="70" stroke="#f59e0b" stroke-width="3"/>
  <text x="575" y="75" text-anchor="start" font-family="monospace" font-size="12" font-weight="bold" fill="#b45309">O(n)</text>

  <!-- O(n log n) - between n and n^2 but gentler -->
  <path d="M 80 400 Q 150 380 200 355 Q 280 300 360 235 Q 440 170 560 100" fill="none" stroke="#8b5cf6" stroke-width="3"/>
  <text x="575" y="105" text-anchor="start" font-family="monospace" font-size="11" font-weight="bold" fill="#6d28d9">O(n log n)</text>

  <!-- O(n˛) - quadratic parabola -->
  <path d="M 80 400 Q 200 350 320 220 Q 440 120 560 75" fill="none" stroke="#ef4444" stroke-width="3"/>
  <text x="575" y="80" text-anchor="start" font-family="monospace" font-size="12" font-weight="bold" fill="#b91c1c">O(n˛)</text>

  <!-- Legend -->
  <rect x="80" y="75" width="200" height="105" rx="6" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="180" y="98" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="bold" fill="#334155">Legend</text>
  <line x1="95" y1="115" x2="130" y2="115" stroke="#22c55e" stroke-width="2"/>
  <text x="140" y="119" font-family="system-ui,sans-serif" font-size="10" fill="#475569">O(1)  constant (best)</text>
  <path d="M 95 130 Q 110 120 130 125" fill="none" stroke="#3b82f6" stroke-width="2"/>
  <text x="140" y="129" font-family="system-ui,sans-serif" font-size="10" fill="#475569">O(log n)  logarithmic</text>
  <line x1="95" y1="143" x2="130" y2="135" stroke="#f59e0b" stroke-width="2"/>
  <text x="140" y="139" font-family="system-ui,sans-serif" font-size="10" fill="#475569">O(n)  linear</text>
  <path d="M 95 153 Q 115 148 130 150" fill="none" stroke="#8b5cf6" stroke-width="2"/>
  <text x="140" y="154" font-family="system-ui,sans-serif" font-size="10" fill="#475569">O(n log n)  linearithmic</text>
  <path d="M 95 165 Q 130 155 130 165" fill="none" stroke="#ef4444" stroke-width="2"/>
  <text x="140" y="169" font-family="system-ui,sans-serif" font-size="10" fill="#475569">O(n˛)  quadratic</text>

  <!-- Examples callout -->
  <rect x="320" y="75" width="220" height="85" rx="6" fill="#f1f5f9" stroke="#94a3b8"/>
  <text x="430" y="98" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="bold" fill="#334155">Common examples</text>
  <text x="335" y="118" font-family="system-ui,sans-serif" font-size="10" fill="#475569">O(1): dict lookup, array index</text>
  <text x="335" y="133" font-family="system-ui,sans-serif" font-size="10" fill="#475569">O(log n): binary search</text>
  <text x="335" y="148" font-family="system-ui,sans-serif" font-size="10" fill="#475569">O(n): linear search, single pass</text>
  <text x="335" y="163" font-family="system-ui,sans-serif" font-size="10" fill="#475569">O(n˛): nested loops, bubble sort</text>
</svg>
