  <title>ML Pipeline Flowchart</title>
  <!-- Data Collection -->
  <rect x="10" y="70" width="105" height="60" rx="8" fill="url(#grad1)" stroke="#2E7D32" stroke-width="2"/>
  <text x="62.5" y="95" text-anchor="middle" fill="white" font-family="Arial" font-size="11" font-weight="bold">Data Collection</text>
  <text x="62.5" y="112" text-anchor="middle" fill="white" font-family="Arial" font-size="9">=Ę Raw Data</text>
  <!-- Arrow -->
  <line x1="115" y1="100" x2="148" y2="100" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <!-- Cleaning -->
  <rect x="150" y="70" width="105" height="60" rx="8" fill="url(#grad2)" stroke="#1565C0" stroke-width="2"/>
  <text x="202.5" y="95" text-anchor="middle" fill="white" font-family="Arial" font-size="11" font-weight="bold">Cleaning</text>
  <text x="202.5" y="112" text-anchor="middle" fill="white" font-family="Arial" font-size="9">>ů Handle Missing</text>
  <line x1="255" y1="100" x2="288" y2="100" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <!-- Feature Engineering -->
  <rect x="290" y="70" width="105" height="60" rx="8" fill="url(#grad3)" stroke="#F57C00" stroke-width="2"/>
