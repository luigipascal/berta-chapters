  <text x="342.5" y="112" text-anchor="middle" fill="white" font-family="Arial" font-size="9">=' Transform</text>
  <line x1="395" y1="100" x2="428" y2="100" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <!-- Train/Val/Test Split -->
  <rect x="430" y="70" width="105" height="60" rx="8" fill="url(#grad4)" stroke="#6A1B9A" stroke-width="2"/>
  <text x="482.5" y="92" text-anchor="middle" fill="white" font-family="Arial" font-size="9" font-weight="bold">Train/Val/Test</text>
  <text x="482.5" y="107" text-anchor="middle" fill="white" font-family="Arial" font-size="9">Split</text>
  <text x="482.5" y="122" text-anchor="middle" fill="white" font-family="Arial" font-size="9">=Â 60/20/20</text>
  <line x1="535" y1="100" x2="568" y2="100" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <!-- Model Training -->
  <rect x="570" y="70" width="105" height="60" rx="8" fill="url(#grad5)" stroke="#C2185B" stroke-width="2"/>
  <text x="622.5" y="95" text-anchor="middle" fill="white" font-family="Arial" font-size="11" font-weight="bold">Model Training</text>
  <text x="622.5" y="112" text-anchor="middle" fill="white" font-family="Arial" font-size="9">>ŕ Fit Algorithm</text>
  <line x1="675" y1="100" x2="708" y2="100" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <!-- Evaluation -->
  <rect x="710" y="70" width="105" height="60" rx="8" fill="url(#grad6)" stroke="#00838F" stroke-width="2"/>
  <text x="762.5" y="95" text-anchor="middle" fill="white" font-family="Arial" font-size="11" font-weight="bold">Evaluation</text>
  <text x="762.5" y="112" text-anchor="middle" fill="white" font-family="Arial" font-size="9">=Č Metrics</text>
  <line x1="815" y1="100" x2="848" y2="100" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <!-- Deployment -->
  <rect x="850" y="70" width="40" height="60" rx="8" fill="url(#grad7)" stroke="#5D4037" stroke-width="2"/>
  <text x="870" y="95" text-anchor="middle" fill="white" font-family="Arial" font-size="9" font-weight="bold">Deploy</text>
  <text x="870" y="112" text-anchor="middle" fill="white" font-family="Arial" font-size="9">=€</text>
</svg>
