<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 550 320" width="550" height="320">
  <defs>
    <style>
      .title { font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; }
      .formula { font-family: monospace; font-size: 11px; }
      .label { font-family: Arial, sans-serif; font-size: 12px; font-weight: bold; }
    </style>
    <linearGradient id="tp" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#4CAF50"/><stop offset="100%" stop-color="#81C784"/></linearGradient>
    <linearGradient id="tn" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#2196F3"/><stop offset="100%" stop-color="#64B5F6"/></linearGradient>
    <linearGradient id="fp" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#FF9800"/><stop offset="100%" stop-color="#FFB74D"/></linearGradient>
    <linearGradient id="fn" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#F44336"/><stop offset="100%" stop-color="#E57373"/></linearGradient>
  </defs>
  <title>Model Evaluation - Confusion Matrix &amp; Metrics</title>
  <!-- Confusion Matrix -->
  <g transform="translate(30, 30)">
    <text x="130" y="0" text-anchor="middle" class="title">Confusion Matrix</text>
    <text x="260" y="18" text-anchor="middle" class="label" fill="#666">Predicted</text>
    <!-- Grid -->
    <rect x="80" y="35" width="100" height="80" fill="url(#tp)" stroke="#2E7D32" stroke-width="2"/>
    <rect x="180" y="35" width="100" height="80" fill="url(#fp)" stroke="#E65100" stroke-width="2"/>
    <rect x="80" y="115" width="100" height="80" fill="url(#fn)" stroke="#C62828" stroke-width="2"/>
    <rect x="180" y="115" width="100" height="80" fill="url(#tn)" stroke="#1565C0" stroke-width="2"/>
    <!-- Labels -->
    <text x="130" y="80" text-anchor="middle" fill="white" font-size="18" font-weight="bold">TP</text>
    <text x="130" y="98" text-anchor="middle" fill="white" font-size="10">True Positive</text>
    <text x="230" y="80" text-anchor="middle" fill="white" font-size="18" font-weight="bold">FP</text>
    <text x="230" y="98" text-anchor="middle" fill="white" font-size="10">False Positive</text>
    <text x="130" y="160" text-anchor="middle" fill="white" font-size="18" font-weight="bold">FN</text>
    <text x="130" y="178" text-anchor="middle" fill="white" font-size="10">False Negative</text>
    <text x="230" y="160" text-anchor="middle" fill="white" font-size="18" font-weight="bold">TN</text>
    <text x="230" y="178" text-anchor="middle" fill="white" font-size="10">True Negative</text>
    <!-- Axis labels -->
    <text x="50" y="95" text-anchor="middle" transform="rotate(-90, 50, 95)" class="label">Actual</text>
    <text x="130" y="220" text-anchor="middle" class="label">Positive</text>
    <text x="230" y="220" text-anchor="middle" class="label">Negative</text>
    <text x="40" y="75" text-anchor="middle" class="label">Positive</text>
    <text x="40" y="155" text-anchor="middle" class="label">Negative</text>
  </g>
  <!-- Metrics -->
  <g transform="translate(320, 30)">
    <text x="100" y="0" text-anchor="middle" class="title">Derived Metrics</text>
    <rect x="0" y="25" width="200" height="45" fill="#E3F2FD" stroke="#1976D2" stroke-width="1" rx="4"/>
    <text x="10" y="45" class="formula">Accuracy = (TP + TN) / (TP + TN + FP + FN)</text>
    <text x="10" y="62" class="label">Overall correctness</text>
    <rect x="0" y="80" width="200" height="45" fill="#E8F5E9" stroke="#388E3C" stroke-width="1" rx="4"/>
    <text x="10" y="100" class="formula">Precision = TP / (TP + FP)</text>
    <text x="10" y="117" class="label">Of predicted positives, how many correct?</text>
    <rect x="0" y="135" width="200" height="45" fill="#FFF3E0" stroke="#F57C00" stroke-width="1" rx="4"/>
    <text x="10" y="155" class="formula">Recall = TP / (TP + FN)</text>
    <text x="10" y="172" class="label">Of actual positives, how many found?</text>
    <rect x="0" y="190" width="200" height="45" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="1" rx="4"/>
    <text x="10" y="210" class="formula">F1 = 2 * (Precision * Recall) / (Precision + Recall)</text>
    <text x="10" y="227" class="label">Harmonic mean of Precision &amp; Recall</text>
  </g>
</svg>
