<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300">
  <style>
    text { font-family: Arial, sans-serif; }
    .title { font-size: 14px; font-weight: bold; fill: #333; }
    .label { font-size: 11px; fill: #555; }
    .small { font-size: 9px; fill: #888; }
  </style>

  <text x="450" y="25" text-anchor="middle" class="title">Convolutional Neural Network Architecture</text>

  <!-- Input Image -->
  <rect x="20" y="70" width="80" height="80" rx="4" fill="#e8f0fe" stroke="#4a90d9" stroke-width="1.5"/>
  <rect x="25" y="75" width="70" height="70" rx="2" fill="#fff" stroke="#4a90d9" stroke-width="0.5"/>
  <!-- Grid lines to suggest image -->
  <line x1="35" y1="75" x2="35" y2="145" stroke="#ddd" stroke-width="0.5"/>
  <line x1="45" y1="75" x2="45" y2="145" stroke="#ddd" stroke-width="0.5"/>
  <line x1="55" y1="75" x2="55" y2="145" stroke="#ddd" stroke-width="0.5"/>
  <line x1="65" y1="75" x2="65" y2="145" stroke="#ddd" stroke-width="0.5"/>
  <line x1="75" y1="75" x2="75" y2="145" stroke="#ddd" stroke-width="0.5"/>
  <line x1="85" y1="75" x2="85" y2="145" stroke="#ddd" stroke-width="0.5"/>
  <line x1="25" y1="85" x2="95" y2="85" stroke="#ddd" stroke-width="0.5"/>
  <line x1="25" y1="95" x2="95" y2="95" stroke="#ddd" stroke-width="0.5"/>
  <line x1="25" y1="105" x2="95" y2="105" stroke="#ddd" stroke-width="0.5"/>
  <line x1="25" y1="115" x2="95" y2="115" stroke="#ddd" stroke-width="0.5"/>
  <line x1="25" y1="125" x2="95" y2="125" stroke="#ddd" stroke-width="0.5"/>
  <line x1="25" y1="135" x2="95" y2="135" stroke="#ddd" stroke-width="0.5"/>
  <text x="60" y="170" text-anchor="middle" class="label" fill="#4a90d9">Input</text>
  <text x="60" y="183" text-anchor="middle" class="small">32x32x3</text>

  <!-- Arrow -->
  <line x1="105" y1="110" x2="135" y2="110" stroke="#999" stroke-width="1.5"/>
  <polygon points="135,105 145,110 135,115" fill="#999"/>

  <!-- Conv1 + ReLU -->
  <rect x="150" y="55" width="70" height="110" rx="4" fill="#e8f8e8" stroke="#27ae60" stroke-width="1.5"/>
  <rect x="157" y="62" width="56" height="96" rx="2" fill="#fff" stroke="#27ae60" stroke-width="0.5"/>
  <text x="185" y="115" text-anchor="middle" class="small" fill="#27ae60">Conv1</text>
  <text x="185" y="170" text-anchor="middle" class="label" fill="#27ae60">Conv+ReLU</text>
  <text x="185" y="183" text-anchor="middle" class="small">16 filters</text>

  <!-- Arrow -->
  <line x1="225" y1="110" x2="255" y2="110" stroke="#999" stroke-width="1.5"/>
  <polygon points="255,105 265,110 255,115" fill="#999"/>

  <!-- MaxPool1 -->
  <rect x="270" y="70" width="55" height="80" rx="4" fill="#fef5e7" stroke="#e67e22" stroke-width="1.5"/>
  <rect x="277" y="77" width="41" height="66" rx="2" fill="#fff" stroke="#e67e22" stroke-width="0.5"/>
  <text x="297" y="115" text-anchor="middle" class="small" fill="#e67e22">Pool</text>
  <text x="297" y="170" text-anchor="middle" class="label" fill="#e67e22">MaxPool</text>
  <text x="297" y="183" text-anchor="middle" class="small">2x2</text>

  <!-- Arrow -->
  <line x1="330" y1="110" x2="360" y2="110" stroke="#999" stroke-width="1.5"/>
  <polygon points="360,105 370,110 360,115" fill="#999"/>

  <!-- Conv2 + ReLU -->
  <rect x="375" y="60" width="60" height="100" rx="4" fill="#e8f8e8" stroke="#27ae60" stroke-width="1.5"/>
  <rect x="382" y="67" width="46" height="86" rx="2" fill="#fff" stroke="#27ae60" stroke-width="0.5"/>
  <text x="405" y="115" text-anchor="middle" class="small" fill="#27ae60">Conv2</text>
  <text x="405" y="170" text-anchor="middle" class="label" fill="#27ae60">Conv+ReLU</text>
  <text x="405" y="183" text-anchor="middle" class="small">32 filters</text>

  <!-- Arrow -->
  <line x1="440" y1="110" x2="470" y2="110" stroke="#999" stroke-width="1.5"/>
  <polygon points="470,105 480,110 470,115" fill="#999"/>

  <!-- MaxPool2 -->
  <rect x="485" y="75" width="45" height="70" rx="4" fill="#fef5e7" stroke="#e67e22" stroke-width="1.5"/>
  <rect x="492" y="82" width="31" height="56" rx="2" fill="#fff" stroke="#e67e22" stroke-width="0.5"/>
  <text x="507" y="115" text-anchor="middle" class="small" fill="#e67e22">Pool</text>
  <text x="507" y="170" text-anchor="middle" class="label" fill="#e67e22">MaxPool</text>
  <text x="507" y="183" text-anchor="middle" class="small">2x2</text>

  <!-- Arrow -->
  <line x1="535" y1="110" x2="565" y2="110" stroke="#999" stroke-width="1.5"/>
  <polygon points="565,105 575,110 565,115" fill="#999"/>

  <!-- Flatten -->
  <rect x="580" y="80" width="30" height="60" rx="4" fill="#f5f5f5" stroke="#666" stroke-width="1.5"/>
  <text x="595" y="115" text-anchor="middle" class="small" fill="#666">F</text>
  <text x="595" y="170" text-anchor="middle" class="label">Flatten</text>

  <!-- Arrow -->
  <line x1="615" y1="110" x2="645" y2="110" stroke="#999" stroke-width="1.5"/>
  <polygon points="645,105 655,110 645,115" fill="#999"/>

  <!-- FC1 -->
  <circle cx="675" cy="90" r="8" fill="#f5eef8" stroke="#8e44ad" stroke-width="1.5"/>
  <circle cx="675" cy="110" r="8" fill="#f5eef8" stroke="#8e44ad" stroke-width="1.5"/>
  <circle cx="675" cy="130" r="8" fill="#f5eef8" stroke="#8e44ad" stroke-width="1.5"/>
  <text x="675" y="170" text-anchor="middle" class="label" fill="#8e44ad">FC</text>
  <text x="675" y="183" text-anchor="middle" class="small">128 units</text>

  <!-- Arrow -->
  <line x1="690" y1="110" x2="720" y2="110" stroke="#999" stroke-width="1.5"/>
  <polygon points="720,105 730,110 720,115" fill="#999"/>

  <!-- Output -->
  <circle cx="755" cy="100" r="8" fill="#fde8e8" stroke="#c0392b" stroke-width="1.5"/>
  <circle cx="755" cy="120" r="8" fill="#fde8e8" stroke="#c0392b" stroke-width="1.5"/>
  <text x="755" y="170" text-anchor="middle" class="label" fill="#c0392b">Output</text>
  <text x="755" y="183" text-anchor="middle" class="small">N classes</text>

  <!-- Legend -->
  <rect x="30" y="210" width="840" height="70" rx="6" fill="#fafafa" stroke="#ddd" stroke-width="1"/>
  <rect x="45" y="225" width="12" height="12" rx="2" fill="#e8f8e8" stroke="#27ae60" stroke-width="1"/>
  <text x="63" y="235" class="small" fill="#333">Convolution: learnable filters detect features (edges, textures, shapes)</text>
  <rect x="45" y="245" width="12" height="12" rx="2" fill="#fef5e7" stroke="#e67e22" stroke-width="1"/>
  <text x="63" y="255" class="small" fill="#333">Pooling: reduce spatial dimensions, keep strongest activations</text>
  <circle cx="51" cy="271" r="6" fill="#f5eef8" stroke="#8e44ad" stroke-width="1"/>
  <text x="63" y="275" class="small" fill="#333">Fully Connected: classify extracted features into output categories</text>
  <text x="500" y="235" class="small" fill="#333">Key insight: early layers detect simple features, deeper layers detect complex patterns</text>
  <text x="500" y="255" class="small" fill="#333">Parameters: Conv layers have few params (shared weights), FC layers have many</text>
</svg>
