<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300">
  <style>
    text { font-family: Arial, sans-serif; }
    .title { font-size: 14px; font-weight: bold; fill: #333; }
    .label { font-size: 11px; fill: #555; }
    .small { font-size: 9px; fill: #888; }
  </style>

  <text x="450" y="25" text-anchor="middle" class="title">Feedforward Neural Network</text>

  <!-- Input Layer -->
  <text x="100" y="55" text-anchor="middle" class="label" fill="#4a90d9">Input Layer</text>
  <circle cx="100" cy="100" r="18" fill="#e8f0fe" stroke="#4a90d9" stroke-width="2"/>
  <text x="100" y="104" text-anchor="middle" class="small" fill="#4a90d9">x1</text>
  <circle cx="100" cy="160" r="18" fill="#e8f0fe" stroke="#4a90d9" stroke-width="2"/>
  <text x="100" y="164" text-anchor="middle" class="small" fill="#4a90d9">x2</text>
  <circle cx="100" cy="220" r="18" fill="#e8f0fe" stroke="#4a90d9" stroke-width="2"/>
  <text x="100" y="224" text-anchor="middle" class="small" fill="#4a90d9">x3</text>

  <!-- Hidden Layer 1 -->
  <text x="320" y="55" text-anchor="middle" class="label" fill="#27ae60">Hidden Layer 1</text>
  <circle cx="320" cy="85" r="18" fill="#e8f8e8" stroke="#27ae60" stroke-width="2"/>
  <text x="320" y="89" text-anchor="middle" class="small" fill="#27ae60">h1</text>
  <circle cx="320" cy="140" r="18" fill="#e8f8e8" stroke="#27ae60" stroke-width="2"/>
  <text x="320" y="144" text-anchor="middle" class="small" fill="#27ae60">h2</text>
  <circle cx="320" cy="195" r="18" fill="#e8f8e8" stroke="#27ae60" stroke-width="2"/>
  <text x="320" y="199" text-anchor="middle" class="small" fill="#27ae60">h3</text>
  <circle cx="320" cy="250" r="18" fill="#e8f8e8" stroke="#27ae60" stroke-width="2"/>
  <text x="320" y="254" text-anchor="middle" class="small" fill="#27ae60">h4</text>

  <!-- Hidden Layer 2 -->
  <text x="540" y="55" text-anchor="middle" class="label" fill="#e67e22">Hidden Layer 2</text>
  <circle cx="540" cy="110" r="18" fill="#fef5e7" stroke="#e67e22" stroke-width="2"/>
  <text x="540" y="114" text-anchor="middle" class="small" fill="#e67e22">h5</text>
  <circle cx="540" cy="170" r="18" fill="#fef5e7" stroke="#e67e22" stroke-width="2"/>
  <text x="540" y="174" text-anchor="middle" class="small" fill="#e67e22">h6</text>
  <circle cx="540" cy="230" r="18" fill="#fef5e7" stroke="#e67e22" stroke-width="2"/>
  <text x="540" y="234" text-anchor="middle" class="small" fill="#e67e22">h7</text>

  <!-- Output Layer -->
  <text x="760" y="55" text-anchor="middle" class="label" fill="#8e44ad">Output Layer</text>
  <circle cx="760" cy="160" r="18" fill="#f5eef8" stroke="#8e44ad" stroke-width="2"/>
  <text x="760" y="164" text-anchor="middle" class="small" fill="#8e44ad">y</text>

  <!-- Connections: Input ’ Hidden1 -->
  <line x1="118" y1="100" x2="302" y2="85" stroke="#ccc" stroke-width="0.8"/>
  <line x1="118" y1="100" x2="302" y2="140" stroke="#ccc" stroke-width="0.8"/>
  <line x1="118" y1="100" x2="302" y2="195" stroke="#ccc" stroke-width="0.8"/>
  <line x1="118" y1="100" x2="302" y2="250" stroke="#ccc" stroke-width="0.8"/>
  <line x1="118" y1="160" x2="302" y2="85" stroke="#ccc" stroke-width="0.8"/>
  <line x1="118" y1="160" x2="302" y2="140" stroke="#ccc" stroke-width="0.8"/>
  <line x1="118" y1="160" x2="302" y2="195" stroke="#ccc" stroke-width="0.8"/>
  <line x1="118" y1="160" x2="302" y2="250" stroke="#ccc" stroke-width="0.8"/>
  <line x1="118" y1="220" x2="302" y2="85" stroke="#ccc" stroke-width="0.8"/>
  <line x1="118" y1="220" x2="302" y2="140" stroke="#ccc" stroke-width="0.8"/>
  <line x1="118" y1="220" x2="302" y2="195" stroke="#ccc" stroke-width="0.8"/>
  <line x1="118" y1="220" x2="302" y2="250" stroke="#ccc" stroke-width="0.8"/>

  <!-- Connections: Hidden1 ’ Hidden2 -->
  <line x1="338" y1="85" x2="522" y2="110" stroke="#ccc" stroke-width="0.8"/>
  <line x1="338" y1="85" x2="522" y2="170" stroke="#ccc" stroke-width="0.8"/>
  <line x1="338" y1="85" x2="522" y2="230" stroke="#ccc" stroke-width="0.8"/>
  <line x1="338" y1="140" x2="522" y2="110" stroke="#ccc" stroke-width="0.8"/>
  <line x1="338" y1="140" x2="522" y2="170" stroke="#ccc" stroke-width="0.8"/>
  <line x1="338" y1="140" x2="522" y2="230" stroke="#ccc" stroke-width="0.8"/>
  <line x1="338" y1="195" x2="522" y2="110" stroke="#ccc" stroke-width="0.8"/>
  <line x1="338" y1="195" x2="522" y2="170" stroke="#ccc" stroke-width="0.8"/>
  <line x1="338" y1="195" x2="522" y2="230" stroke="#ccc" stroke-width="0.8"/>
  <line x1="338" y1="250" x2="522" y2="110" stroke="#ccc" stroke-width="0.8"/>
  <line x1="338" y1="250" x2="522" y2="170" stroke="#ccc" stroke-width="0.8"/>
  <line x1="338" y1="250" x2="522" y2="230" stroke="#ccc" stroke-width="0.8"/>

  <!-- Connections: Hidden2 ’ Output -->
  <line x1="558" y1="110" x2="742" y2="160" stroke="#ccc" stroke-width="0.8"/>
  <line x1="558" y1="170" x2="742" y2="160" stroke="#ccc" stroke-width="0.8"/>
  <line x1="558" y1="230" x2="742" y2="160" stroke="#ccc" stroke-width="0.8"/>

  <!-- Annotations -->
  <text x="210" y="280" text-anchor="middle" class="small">W[1], b[1]</text>
  <text x="430" y="280" text-anchor="middle" class="small">W[2], b[2]</text>
  <text x="650" y="280" text-anchor="middle" class="small">W[3], b[3]</text>
  <text x="450" y="295" text-anchor="middle" class="label">z = Wx + b, a = activation(z)</text>
</svg>
