<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 480" width="780" height="480">
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#3b82f6" />
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#22c55e" />
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#f59e0b" />
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#8b5cf6" />
    </marker>
    <marker id="arrowGray" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#64748b" />
    </marker>
  </defs>
  <rect width="780" height="480" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" rx="6"/>
  <text x="390" y="28" text-anchor="middle" font-family="system-ui,sans-serif" font-size="20" font-weight="bold" fill="#1e293b">Vector Operations in 2D</text>
  <text x="390" y="48" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">Addition (head-to-tail), scalar multiplication, dot product (projection)</text>

  <!-- Vector Addition - left panel -->
  <rect x="20" y="70" width="240" height="190" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="140" y="98" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="bold" fill="#1e40af">Vector Addition</text>
  <text x="140" y="114" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#64748b">a + b (head-to-tail)</text>

  <!-- Grid for addition -->
  <g transform="translate(50, 130)">
    <line x1="0" y1="80" x2="180" y2="80" stroke="#e2e8f0" stroke-width="1"/>
    <line x1="0" y1="60" x2="180" y2="60" stroke="#e2e8f0" stroke-width="1"/>
    <line x1="0" y1="40" x2="180" y2="40" stroke="#e2e8f0" stroke-width="1"/>
    <line x1="0" y1="20" x2="180" y2="20" stroke="#e2e8f0" stroke-width="1"/>
    <line x1="0" y1="0" x2="180" y2="0" stroke="#e2e8f0" stroke-width="1"/>
    <line x1="20" y1="0" x2="20" y2="80" stroke="#e2e8f0" stroke-width="1"/>
    <line x1="40" y1="0" x2="40" y2="80" stroke="#e2e8f0" stroke-width="1"/>
    <line x1="60" y1="0" x2="60" y2="80" stroke="#e2e8f0" stroke-width="1"/>
    <line x1="80" y1="0" x2="80" y2="80" stroke="#e2e8f0" stroke-width="1"/>
    <line x1="100" y1="0" x2="100" y2="80" stroke="#e2e8f0" stroke-width="1"/>
    <line x1="120" y1="0" x2="120" y2="80" stroke="#e2e8f0" stroke-width="1"/>
    <line x1="140" y1="0" x2="140" y2="80" stroke="#e2e8f0" stroke-width="1"/>
    <line x1="160" y1="0" x2="160" y2="80" stroke="#e2e8f0" stroke-width="1"/>
    <line x1="90" y1="80" x2="90" y2="0" stroke="#94a3b8" stroke-width="1"/>
    <line x1="0" y1="40" x2="180" y2="40" stroke="#94a3b8" stroke-width="1"/>
    <text x="92" y="95" font-family="system-ui,sans-serif" font-size="9" fill="#64748b">x</text>
    <text x="175" y="43" font-family="system-ui,sans-serif" font-size="9" fill="#64748b">y</text>
    <!-- a = (3, 2) -->
    <line x1="0" y1="80" x2="60" y2="60" stroke="#3b82f6" stroke-width="3" marker-end="url(#arrowBlue)"/>
    <text x="30" y="62" font-family="system-ui,sans-serif" font-size="10" fill="#1e40af">a</text>
    <!-- b = (4, 1) from head of a -->
    <line x1="60" y1="60" x2="140" y2="50" stroke="#22c55e" stroke-width="3" marker-end="url(#arrowGreen)"/>
    <text x="95" y="52" font-family="system-ui,sans-serif" font-size="10" fill="#166534">b</text>
    <!-- a + b result -->
    <line x1="0" y1="80" x2="140" y2="50" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="4,2" marker-end="url(#arrowPurple)"/>
    <text x="75" y="55" font-family="system-ui,sans-serif" font-size="10" fill="#6d28d9">a+b</text>
  </g>
  <text x="140" y="268" text-anchor="middle" font-family="monospace" font-size="10" fill="#475569">a=(3,2), b=(4,1) ’ a+b=(7,3)</text>

  <!-- Scalar Multiplication - center panel -->
  <rect x="275" y="70" width="240" height="190" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="395" y="98" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="bold" fill="#166534">Scalar Multiplication</text>
  <text x="395" y="114" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#64748b">k·v (stretching/shrinking)</text>

  <!-- Grid for scalar mult -->
  <g transform="translate(305, 130)">
    <line x1="0" y1="70" x2="180" y2="70" stroke="#e2e8f0" stroke-width="1"/>
    <line x1="90" y1="0" x2="90" y2="70" stroke="#94a3b8" stroke-width="1"/>
    <line x1="0" y1="35" x2="180" y2="35" stroke="#94a3b8" stroke-width="1"/>
    <!-- v -->
    <line x1="0" y1="70" x2="40" y2="50" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowBlue)"/>
    <text x="15" y="55" font-family="system-ui,sans-serif" font-size="10" fill="#1e40af">v</text>
    <!-- 2v -->
    <line x1="0" y1="70" x2="80" y2="30" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowGreen)"/>
    <text x="45" y="42" font-family="system-ui,sans-serif" font-size="10" fill="#166534">2v</text>
    <!-- 0.5v -->
    <line x1="0" y1="70" x2="20" y2="60" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrowOrange)"/>
    <text x="5" y="58" font-family="system-ui,sans-serif" font-size="10" fill="#b45309">˝v</text>
  </g>
  <text x="395" y="268" text-anchor="middle" font-family="monospace" font-size="10" fill="#475569">k·v: k=2 doubles length, k=˝ halves</text>

  <!-- Dot Product - right panel -->
  <rect x="530" y="70" width="230" height="190" rx="8" fill="#fefce8" stroke="#eab308" stroke-width="2"/>
  <text x="645" y="98" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="bold" fill="#854d0e">Dot Product (Projection)</text>
  <text x="645" y="114" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#64748b">a·b = |a||b|cos ¸</text>

  <!-- Grid for dot product -->
  <g transform="translate(560, 130)">
    <line x1="0" y1="70" x2="160" y2="70" stroke="#e2e8f0" stroke-width="1"/>
    <line x1="80" y1="0" x2="80" y2="70" stroke="#94a3b8" stroke-width="1"/>
    <line x1="0" y1="35" x2="160" y2="35" stroke="#94a3b8" stroke-width="1"/>
    <!-- Vector b (horizontal) -->
    <line x1="0" y1="70" x2="120" y2="70" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowGreen)"/>
    <text x="55" y="82" font-family="system-ui,sans-serif" font-size="10" fill="#166534">b</text>
    <!-- Vector a ( angled) -->
    <line x1="0" y1="70" x2="90" y2="25" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowBlue)"/>
    <text x="35" y="42" font-family="system-ui,sans-serif" font-size="10" fill="#1e40af">a</text>
    <!-- Projection of a onto b (dashed) -->
    <line x1="0" y1="70" x2="67" y2="70" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="3,2"/>
    <line x1="67" y1="70" x2="67" y2="48" stroke="#94a3b8" stroke-width="1" stroke-dasharray="2,2"/>
    <text x="72" y="62" font-family="system-ui,sans-serif" font-size="9" fill="#b45309">proj</text>
  </g>
  <text x="645" y="268" text-anchor="middle" font-family="monospace" font-size="10" fill="#475569">a·b = scalar; proj_b(a) = (a·b/|b|˛)b</text>

  <!-- Component notation -->
  <rect x="20" y="280" width="740" height="180" rx="8" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="390" y="308" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="bold" fill="#334155">Vector Component Notation</text>
  <rect x="50" y="325" width="220" height="50" rx="6" fill="white" stroke="#94a3b8"/>
  <text x="160" y="348" text-anchor="middle" font-family="monospace" font-size="12" fill="#334155">a = (a“, ag) or a = [a“]</text>
  <text x="160" y="365" text-anchor="middle" font-family="monospace" font-size="12" fill="#334155">            [ag]</text>
  <rect x="290" y="325" width="200" height="50" rx="6" fill="white" stroke="#94a3b8"/>
  <text x="390" y="348" text-anchor="middle" font-family="monospace" font-size="12" fill="#334155">a + b = (a“+b“, ag+bg)</text>
  <text x="390" y="365" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#64748b">Component-wise addition</text>
  <rect x="510" y="325" width="220" height="50" rx="6" fill="white" stroke="#94a3b8"/>
  <text x="620" y="348" text-anchor="middle" font-family="monospace" font-size="12" fill="#334155">k·a = (k·a“, k·ag)</text>
  <text x="620" y="365" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#64748b">Scale each component</text>
  <rect x="50" y="390" width="680" height="55" rx="6" fill="white" stroke="#94a3b8"/>
  <text x="390" y="415" text-anchor="middle" font-family="monospace" font-size="12" fill="#334155">a·b = a“b“ + agbg (scalar)  |  |a| = (a“˛ + ag˛)  |  cos ¸ = (a·b)/(|a||b|)</text>
</svg>
