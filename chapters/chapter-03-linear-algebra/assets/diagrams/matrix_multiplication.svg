<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" width="800" height="520">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#64748b" />
    </marker>
  </defs>
  <rect width="800" height="520" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1" rx="6"/>
  <text x="400" y="28" text-anchor="middle" font-family="system-ui,sans-serif" font-size="20" font-weight="bold" fill="#1e293b">Matrix Multiplication: 2×3 × 3×2</text>
  <text x="400" y="48" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">Row × column pairs produce each element of the result</text>

  <!-- Matrix A (2x3) -->
  <rect x="80" y="85" width="180" height="120" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="170" y="112" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="bold" fill="#1e40af">Matrix A</text>
  <text x="170" y="128" text-anchor="middle" font-family="monospace" font-size="10" fill="#64748b">(2×3)</text>
  <rect x="95" y="140" width="50" height="28" rx="2" fill="#93c5fd"/>
  <text x="120" y="158" text-anchor="middle" font-family="monospace" font-size="12" fill="#1e40af">1</text>
  <rect x="150" y="140" width="50" height="28" rx="2" fill="#93c5fd"/>
  <text x="175" y="158" text-anchor="middle" font-family="monospace" font-size="12" fill="#1e40af">2</text>
  <rect x="205" y="140" width="50" height="28" rx="2" fill="#93c5fd"/>
  <text x="230" y="158" text-anchor="middle" font-family="monospace" font-size="12" fill="#1e40af">3</text>
  <rect x="95" y="173" width="50" height="28" rx="2" fill="#93c5fd"/>
  <text x="120" y="191" text-anchor="middle" font-family="monospace" font-size="12" fill="#1e40af">4</text>
  <rect x="150" y="173" width="50" height="28" rx="2" fill="#93c5fd"/>
  <text x="175" y="191" text-anchor="middle" font-family="monospace" font-size="12" fill="#1e40af">5</text>
  <rect x="205" y="173" width="50" height="28" rx="2" fill="#93c5fd"/>
  <text x="230" y="191" text-anchor="middle" font-family="monospace" font-size="12" fill="#1e40af">6</text>
  <text x="95" y="215" font-family="system-ui,sans-serif" font-size="9" fill="#64748b">row 1</text>
  <text x="95" y="228" font-family="system-ui,sans-serif" font-size="9" fill="#64748b">row 2</text>

  <!-- Multiplication sign -->
  <text x="295" y="165" text-anchor="middle" font-family="system-ui,sans-serif" font-size="28" font-weight="bold" fill="#64748b">×</text>

  <!-- Matrix B (3x2) -->
  <rect x="320" y="85" width="150" height="120" rx="6" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="395" y="112" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="bold" fill="#166534">Matrix B</text>
  <text x="395" y="128" text-anchor="middle" font-family="monospace" font-size="10" fill="#64748b">(3×2)</text>
  <rect x="335" y="140" width="45" height="25" rx="2" fill="#86efac"/>
  <text x="357" y="156" text-anchor="middle" font-family="monospace" font-size="11" fill="#166534">7</text>
  <rect x="385" y="140" width="45" height="25" rx="2" fill="#86efac"/>
  <text x="407" y="156" text-anchor="middle" font-family="monospace" font-size="11" fill="#166534">8</text>
  <rect x="335" y="170" width="45" height="25" rx="2" fill="#86efac"/>
  <text x="357" y="186" text-anchor="middle" font-family="monospace" font-size="11" fill="#166534">9</text>
  <rect x="385" y="170" width="45" height="25" rx="2" fill="#86efac"/>
  <text x="407" y="186" text-anchor="middle" font-family="monospace" font-size="11" fill="#166534">10</text>
  <rect x="335" y="200" width="45" height="25" rx="2" fill="#86efac"/>
  <text x="357" y="216" text-anchor="middle" font-family="monospace" font-size="11" fill="#166534">11</text>
  <rect x="385" y="200" width="45" height="25" rx="2" fill="#86efac"/>
  <text x="407" y="216" text-anchor="middle" font-family="monospace" font-size="11" fill="#166534">12</text>
  <text x="350" y="235" font-family="system-ui,sans-serif" font-size="9" fill="#64748b">col1 col2</text>

  <!-- Equals -->
  <text x="505" y="165" text-anchor="middle" font-family="system-ui,sans-serif" font-size="28" font-weight="bold" fill="#64748b">=</text>

  <!-- Result C (2x2) -->
  <rect x="530" y="85" width="140" height="120" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="600" y="112" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="bold" fill="#b45309">Result C</text>
  <text x="600" y="128" text-anchor="middle" font-family="monospace" font-size="10" fill="#64748b">(2×2)</text>
  <rect x="545" y="145" width="55" height="35" rx="4" fill="#fde68a"/>
  <text x="572" y="168" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="#92400e">58</text>
  <rect x="605" y="145" width="55" height="35" rx="4" fill="#fde68a"/>
  <text x="632" y="168" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="#92400e">64</text>
  <rect x="545" y="185" width="55" height="35" rx="4" fill="#fde68a"/>
  <text x="572" y="208" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="#92400e">139</text>
  <rect x="605" y="185" width="55" height="35" rx="4" fill="#fde68a"/>
  <text x="632" y="208" text-anchor="middle" font-family="monospace" font-size="14" font-weight="bold" fill="#92400e">154</text>

  <!-- Connection lines for C[0,0] = 1*7+2*9+3*11 = 58 -->
  <path d="M 145 150 L 200 150 L 200 158 L 330 158 L 330 153" fill="none" stroke="#ef4444" stroke-width="1" stroke-dasharray="3,2"/>
  <path d="M 175 150 L 200 163 L 200 188 L 330 188 L 330 185" fill="none" stroke="#ef4444" stroke-width="1" stroke-dasharray="3,2"/>
  <path d="M 205 150 L 200 213 L 200 218 L 330 218 L 330 208" fill="none" stroke="#ef4444" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="265" y="185" font-family="system-ui,sans-serif" font-size="9" fill="#b91c1c">row1·col1</text>

  <!-- Step-by-step computation -->
  <rect x="80" y="230" width="640" height="165" rx="8" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="400" y="258" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="bold" fill="#334155">Step-by-Step: How C[i,j] is Computed</text>
  <text x="400" y="280" text-anchor="middle" font-family="monospace" font-size="11" fill="#475569">C[i,j] = Ł A[i,k] × B[k,j]  for k = 0 to 2</text>

  <rect x="100" y="295" width="180" height="85" rx="6" fill="white" stroke="#93c5fd"/>
  <text x="190" y="318" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="bold" fill="#1e40af">C[0,0] = 58</text>
  <text x="190" y="338" text-anchor="middle" font-family="monospace" font-size="10" fill="#475569">1×7 + 2×9 + 3×11</text>
  <text x="190" y="356" text-anchor="middle" font-family="monospace" font-size="10" fill="#475569">= 7 + 18 + 33 = 58</text>
  <text x="190" y="372" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#64748b">row 1 of A · col 1 of B</text>

  <rect x="300" y="295" width="180" height="85" rx="6" fill="white" stroke="#93c5fd"/>
  <text x="390" y="318" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="bold" fill="#1e40af">C[0,1] = 64</text>
  <text x="390" y="338" text-anchor="middle" font-family="monospace" font-size="10" fill="#475569">1×8 + 2×10 + 3×12</text>
  <text x="390" y="356" text-anchor="middle" font-family="monospace" font-size="10" fill="#475569">= 8 + 20 + 36 = 64</text>
  <text x="390" y="372" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#64748b">row 1 of A · col 2 of B</text>

  <rect x="500" y="295" width="180" height="85" rx="6" fill="white" stroke="#93c5fd"/>
  <text x="590" y="318" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="bold" fill="#1e40af">C[1,0] = 139</text>
  <text x="590" y="338" text-anchor="middle" font-family="monospace" font-size="10" fill="#475569">4×7 + 5×9 + 6×11</text>
  <text x="590" y="356" text-anchor="middle" font-family="monospace" font-size="10" fill="#475569">= 28 + 45 + 66 = 139</text>
  <text x="590" y="372" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#64748b">row 2 of A · col 1 of B</text>

  <rect x="690" y="295" width="110" height="85" rx="6" fill="white" stroke="#93c5fd"/>
  <text x="745" y="318" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="bold" fill="#1e40af">C[1,1]=154</text>
  <text x="745" y="338" text-anchor="middle" font-family="monospace" font-size="9" fill="#475569">4×8+5×10+6×12</text>
  <text x="745" y="356" text-anchor="middle" font-family="monospace" font-size="9" fill="#475569">= 32+50+72</text>
  <text x="745" y="372" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#64748b">row2·col2</text>

  <!-- Dimension rule -->
  <rect x="80" y="415" width="640" height="85" rx="6" fill="#eff6ff" stroke="#93c5fd"/>
  <text x="400" y="442" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="bold" fill="#1e40af">Dimension Rule</text>
  <text x="400" y="465" text-anchor="middle" font-family="monospace" font-size="12" fill="#334155">(m×n) × (n×p) = (m×p)  inner dimensions n must match</text>
  <text x="400" y="488" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">2×3 × 3×2 ’ inner 3 matches ’ result is 2×2</text>
</svg>
