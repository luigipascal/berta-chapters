site_name: Berta Chapters
site_url: https://berta-chapters.netlify.app
site_description: Learn AI from fundamentals to mastery through interactive, executable chapters. Free, open-source, community-driven.
site_author: Luigi Pascal Rondanini
repo_url: https://github.com/luigipascal/berta-chapters
repo_name: luigipascal/berta-chapters
edit_uri: edit/main/docs/

copyright: >
  Created by <a href="https://rondanini.net">Luigi Pascal Rondanini</a> |
  Generated by <a href="https://berta.one">Berta AI</a> |
  Published by <a href="https://www.rondanini.com">Rondanini Publishing</a>

theme:
  name: material
  language: en
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
    logo: material/robot-happy
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - navigation.indexes
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/luigipascal/berta-chapters
    - icon: fontawesome/brands/linkedin
      link: https://uk.linkedin.com/in/rondanini
    - icon: fontawesome/brands/medium
      link: https://medium.com/@info_38412
    - icon: fontawesome/solid/globe
      link: https://berta.one
  generator: false

extra_css:
  - assets/css/custom.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.mark
  - pymdownx.tasklist:
      custom_checkbox: true
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true

plugins:
  - search
  - minify:
      minify_html: true

nav:
  - Home: index.md
  - Getting Started: guides/getting-started.md
  - Curriculum:
    - Overview: guides/curriculum.md
    - Syllabus: guides/syllabus.md
    - Learning Paths: guides/learning-paths.md
  - Chapters:
    - chapters/index.md
    - "Foundation Track":
      - "Ch 1: Python Fundamentals": chapters/chapter-01.md
      - "Ch 2: Data Structures": chapters/chapter-02.md
      - "Ch 3: Linear Algebra": chapters/chapter-03.md
      - "Ch 4: Probability & Statistics": chapters/chapter-04.md
      - "Ch 5: Software Design": chapters/chapter-05.md
    - "Practitioner Track":
      - "Ch 6: Intro to ML": chapters/chapter-06.md
      - "Ch 7: Supervised Learning": chapters/chapter-07.md
  - Community:
    - Contributing: guides/contributing.md
    - Request a Chapter: guides/chapter-requests.md
    - Roadmap: guides/roadmap.md
  - About:
    - About Berta: guides/about.md
    - Links: guides/links.md
