site_name: Berta Chapters
site_url: https://berta-chapters.netlify.app
site_description: Learn AI from fundamentals to mastery through interactive, executable chapters. Free, open-source, community-driven.
site_author: Luigi Pascal Rondanini
repo_url: https://github.com/luigipascal/berta-chapters
repo_name: luigipascal/berta-chapters
edit_uri: edit/main/docs/

copyright: >
  Created by <a href="https://rondanini.net">Luigi Pascal Rondanini</a> |
  Generated by <a href="https://berta.one">Berta AI</a> |
  Published by <a href="https://www.rondanini.com">Rondanini Publishing</a>

theme:
  name: material
  language: en
  palette:
    scheme: default
    primary: indigo
    accent: cyan
  custom_dir: docs/overrides
  font: false
  icon:
    repo: fontawesome/brands/github
    logo: material/robot-happy
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - navigation.indexes
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow

extra:
  analytics:
    provider: google
    property: G-ZGYSK3Q7WT
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/luigipascal/berta-chapters
    - icon: fontawesome/brands/linkedin
      link: https://uk.linkedin.com/in/rondanini
    - icon: fontawesome/brands/medium
      link: https://medium.com/@info_38412
    - icon: fontawesome/solid/globe
      link: https://berta.one
  generator: false

extra_css:
  - assets/css/custom.css

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.mark
  - pymdownx.tasklist:
      custom_checkbox: true
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true

plugins:
  - search
  - minify:
      minify_html: true

nav:
  - Home: index.md
  - Getting Started: guides/getting-started.md
  - "Setup Guide (Step by Step)": guides/setup.md
  - Curriculum:
    - Overview: guides/curriculum.md
    - Syllabus: guides/syllabus.md
    - Learning Paths: guides/learning-paths.md
  - Chapters:
    - chapters/index.md
    - "Foundation Track":
      - "Ch 1: Python Fundamentals": chapters/chapter-01.md
      - "1.1 Introduction": chapters/content/ch01-01_introduction.md
      - "1.2 Intermediate": chapters/content/ch01-02_intermediate.md
      - "1.3 Advanced": chapters/content/ch01-03_advanced.md
      - "Ch 2: Data Structures": chapters/chapter-02.md
      - "2.1 Introduction": chapters/content/ch02-01_introduction.md
      - "2.2 Intermediate": chapters/content/ch02-02_intermediate.md
      - "2.3 Advanced": chapters/content/ch02-03_advanced.md
      - "Ch 3: Linear Algebra": chapters/chapter-03.md
      - "3.1 Introduction": chapters/content/ch03-01_introduction.md
      - "3.2 Intermediate": chapters/content/ch03-02_intermediate.md
      - "3.3 Advanced": chapters/content/ch03-03_advanced.md
      - "Ch 4: Probability & Statistics": chapters/chapter-04.md
      - "4.1 Introduction": chapters/content/ch04-01_introduction.md
      - "4.2 Intermediate": chapters/content/ch04-02_intermediate.md
      - "4.3 Advanced": chapters/content/ch04-03_advanced.md
      - "Ch 5: Software Design": chapters/chapter-05.md
      - "5.1 Introduction": chapters/content/ch05-01_introduction.md
      - "5.2 Intermediate": chapters/content/ch05-02_intermediate.md
      - "5.3 Advanced": chapters/content/ch05-03_advanced.md
    - "Practitioner Track":
      - "Ch 6: Intro to ML": chapters/chapter-06.md
      - "6.1 Introduction": chapters/content/ch06-01_introduction.md
      - "6.2 Intermediate": chapters/content/ch06-02_intermediate.md
      - "6.3 Advanced": chapters/content/ch06-03_advanced.md
      - "Ch 7: Supervised Learning": chapters/chapter-07.md
      - "7.1 Introduction": chapters/content/ch07-01_introduction.md
      - "7.2 Intermediate": chapters/content/ch07-02_intermediate.md
      - "7.3 Advanced": chapters/content/ch07-03_advanced.md
      - "Ch 8: Unsupervised Learning": chapters/chapter-08.md
      - "8.1 Introduction": chapters/content/ch08-01_introduction.md
      - "8.2 Intermediate": chapters/content/ch08-02_intermediate.md
      - "8.3 Advanced": chapters/content/ch08-03_advanced.md
      - "Ch 9: Deep Learning Fundamentals": chapters/chapter-09.md
      - "9.1 Introduction": chapters/content/ch09-01_introduction.md
      - "9.2 Intermediate": chapters/content/ch09-02_intermediate.md
      - "9.3 Advanced": chapters/content/ch09-03_advanced.md
  - Playground: playground.md
  - Community:
    - Contributing: guides/contributing.md
    - Request a Chapter: guides/chapter-requests.md
    - Roadmap: guides/roadmap.md
  - Newsletter: newsletter.md
  - About:
    - About Berta: guides/about.md
    - Links: guides/links.md
